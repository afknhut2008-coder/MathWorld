<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tần Số - MathLab</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body>
    <nav class="glass-nav">
        <div class="logo">12B2<span>Math</span></div>
        <ul>
            <li><a href="index.html">Trang Chủ</a></li>
            <li><a href="probability.html">Thường</a></li>
            <li><a href="frequency.html" class="active">Tần Số</a></li>
            <li><a href="conditional.html">Điều Kiện</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="glass-card">
            <div class="author-tag">BY MINH NHỰT</div>
            <h2 class="title-neon">TÍNH THEO SỐ PHẦN TỬ \(n\)</h2>
            <p class="title-sub">Nhập số phần tử — xác suất tự động tính</p>
            <div class="freq-input-grid">
                <div class="calc-field">
                    <label>\(n(\Omega)\) — Không gian mẫu</label>
                    <input type="number" id="nOmega" placeholder="0" min="1">
                </div>
                <div class="calc-field">
                    <label>\(n(A)\) — Số phần tử A</label>
                    <input type="number" id="nA" placeholder="0" min="0">
                </div>
                <div class="calc-field">
                    <label>\(n(B)\) — Số phần tử B</label>
                    <input type="number" id="nB" placeholder="0" min="0">
                </div>
                <div class="calc-field">
                    <label>\(n(A \cap B)\) — Giao</label>
                    <input type="number" id="nAnB_f" placeholder="0" min="0">
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;">
                <div class="result-box c-blue active">
                    <small>\(P(A) = n(A) / n(\Omega)\)</small>
                    <span id="pA_f" class="val c-blue">0</span>
                </div>
                <div class="result-box c-green">
                    <small>\(P(B) = n(B) / n(\Omega)\)</small>
                    <span id="pB_f" class="val c-green">0</span>
                </div>
            </div>
            <div class="result-box c-green active" style="margin-top:12px; border-color:var(--emerald);">
                <small>\(P(A \cup B) = P(A) + P(B) - P(A \cap B)\) — KẾT QUẢ</small>
                <span id="pU" class="val c-green">0.0000</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
